spring:
  config:
    activate:
      on-profile: development

# 开发环境配置
logging:
  level:
    com.brag.codereview: DEBUG
    io.agentscope: DEBUG
    reactor.netty: INFO

agentscope:
  model:
    # 在开发环境中可以直接配置API密钥（仅用于本地开发）
    # 生产环境请使用环境变量 DASHSCOPE_API_KEY
    api-key: ${DASHSCOPE_API_KEY:your-development-api-key-here}
    model-name: qwen-plus
    stream: true
    enable-thinking: true
    temperature: 0.7
    max-tokens: 4000
    thinking-budget: 2048

  agent:
    max-iters: 10
    memory-type: in-memory
    memory-max-length: 200

  codereview:
    # 开发环境可以放宽限制以便调试
    max-file-size: 2097152  # 2MB (开发环境增大限制)
    enable-security-scan: true
    enable-performance-analysis: true
    enable-quality-check: true

# 开发环境服务器配置
server:
  port: 8081

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized